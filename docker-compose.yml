services:
  mysql:
    image: mysql:8.0
    environment:
      # Dev-only credentials — do not use in production
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ikite
      MYSQL_USER: ikite
      MYSQL_PASSWORD: ikite
    ports:
      - "3306:3306"
    volumes:
      - ikite_mysql:/var/lib/mysql
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./migrations/002_spots.sql:/docker-entrypoint-initdb.d/002_spots.sql:ro
      - ./migrations/003_spot_collect.sql:/docker-entrypoint-initdb.d/003_spot_collect.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ikite_mysql:
