<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KY Wind Prediction</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 480px;
      margin: 24px auto;
      padding: 0 16px;
      color: #111;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .meta { color: #666; font-size: 0.875rem; margin-bottom: 24px; }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin: 0 0 6px;
      font-weight: 600;
    }
    .card p { margin: 0; font-size: 1.125rem; font-weight: 500; }
    .card.highlight { background: #e8f5e9; border-color: #a5d6a7; }
    .card.highlight p { font-size: 1.25rem; }
    .status { color: #666; font-size: 0.875rem; margin-top: 16px; }
    .err { color: #c00; }
    nav a { margin-right: 12px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Table</a>
    <a href="/graph">Graph</a>
  </nav>

  <h1>KY thermal prediction</h1>
  <p class="meta" id="meta">Loading…</p>

  <div id="content">
    <p class="status">Analyzing Jul–Aug history…</p>
  </div>

  <script>
    (function () {
      const content = document.getElementById('content');
      const meta = document.getElementById('meta');

      fetch('/api/prediction', { credentials: 'same-origin' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (d) {
          meta.textContent = d.date + ' · ' + d.similar_days + ' similar summer days · ' + d.based_on_readings.toLocaleString() + ' readings';
          content.innerHTML =
            '<div class="card highlight"><h2>Strongest window</h2><p>' + esc(d.strongest_window) + '</p></div>' +
            '<div class="card"><h2>Expected peak</h2><p>' + esc(d.expected_peak) + '</p></div>' +
            '<div class="card"><h2>Direction</h2><p>' + esc(d.direction) + '</p></div>' +
            '<div class="card"><h2>Good window</h2><p>' + esc(d.good_window) + '</p></div>' +
            '<div class="card"><h2>Wind down</h2><p>' + esc(d.wind_down) + '</p></div>' +
            (d.conditions ? '<p class="status">' + esc(d.conditions) + '</p>' : '') +
            (d.history && d.history.summary ? '<p class="status">Past accuracy: ' + esc(d.history.summary) + '</p>' : '') +
            (d.current ? '<p class="status">Now: ' + esc(d.current) + '</p>' : '');
        })
        .catch(function (e) {
          content.innerHTML = '<p class="err">Failed to load prediction: ' + esc(e.message) + '</p>';
          meta.textContent = '';
        });

      function esc(s) {
        const el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
      }
    })();
  </script>
</body>
</html>
