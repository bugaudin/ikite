<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wind Alert Settings</title>
  <style>
    input, button { padding: 8px; margin: 4px; }
    nav a { margin-right: 12px; }
    table.spots { border-collapse: collapse; margin: 16px 0; }
    table.spots th, table.spots td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    table.spots th { background: #f5f5f5; }
    table.spots td.center { text-align: center; }
    table.spots tr.dragging { opacity: 0.5; }
    table.spots tr.drag-over td { border-top: 2px solid #333; }
    .drag-handle { cursor: grab; user-select: none; color: #666; padding: 0 8px; }
    .spot-status { margin-left: 8px; font-size: 12px; color: #666; }
    .spot-status.ok { color: #0a0; }
    .spot-status.err { color: #c00; }
    .add-spot { margin: 16px 0 24px; padding: 12px; border: 1px solid #ddd; max-width: 480px; }
    .add-spot label { display: block; margin-top: 8px; }
    .add-spot input { width: 100%; max-width: 280px; box-sizing: border-box; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Table</a>
    <a href="/graph">Graph</a>
    <a href="/camera">Camera</a>
  </nav>

  <p>Current threshold: {{.Threshold}}</p>

  <p style="margin-bottom: 24px;">
    <label for="forecast_telegram">Send AI forecast messages</label>
    <select id="forecast_telegram" name="forecast_telegram">
      <option value="yes"{{if eq .ForecastTelegram "yes"}} selected{{end}}>Yes</option>
      <option value="no"{{if eq .ForecastTelegram "no"}} selected{{end}}>No</option>
    </select>
    <span id="forecast-status" class="spot-status"></span>
  </p>

  <div style="margin-bottom: 24px;">
    <h3>Index page spots <span id="spot-status" class="spot-status"></span></h3>

    <div class="add-spot">
      <strong>Add Windguru spot</strong>
      <label for="windguru_id">Windguru station ID</label>
      <input type="number" id="windguru_id" name="windguru_id" min="1" placeholder="e.g. 2763" />
      <label for="spot_name">Display name</label>
      <input type="text" id="spot_name" name="spot_name" maxlength="100" placeholder="e.g. Shavei Tzion" />
      <p>
        <button type="button" id="add-spot-btn">Add spot</button>
        <span id="add-spot-status" class="spot-status"></span>
      </p>
    </div>

    <table class="spots">
      <thead>
        <tr>
          <th style="width:40px"></th>
          <th>Spot</th>
          <th style="width:90px">Order</th>
          <th>Display on index</th>
          <th>Save to DB</th>
        </tr>
      </thead>
      <tbody id="spots-body">
        {{range .Spots}}
        <tr data-key="{{.Key}}" draggable="true">
          <td class="drag-handle" title="Drag to reorder">⋮⋮</td>
          <td>{{.Name}} <small>({{.Key}})</small></td>
          <td class="center reorder-btns">
            <button type="button" class="move-up" title="Move up">↑</button>
            <button type="button" class="move-down" title="Move down">↓</button>
          </td>
          <td class="center">
            <input type="checkbox" class="spot-visible" data-key="{{.Key}}"{{if .Visible}} checked{{end}} />
          </td>
          <td class="center">
            <input type="checkbox" class="spot-collect" data-key="{{.Key}}"{{if .Collect}} checked{{end}} />
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>

  <form method="post" action="/settings">
    {{range $i, $b := .Buttons}}
    <button class="wind_btn" name="threshold_btn" value="{{$b}}">{{$b}}</button>
    {{if eq (mod $b 4) 0}}<br/><br/>{{end}}
    {{end}}
    <button name="threshold_btn" class="wind_btn" value="999">Disable</button>
    <br/><br/>
    <input name="threshold" value="10" type="number" style="width:60px" />
    <button class="wind_btn">Submit</button>
  </form>

  <script>
    (function () {
      const forecastSelect = document.getElementById('forecast_telegram');
      const forecastStatus = document.getElementById('forecast-status');

      function setForecastStatus(text, ok) {
        forecastStatus.textContent = text;
        forecastStatus.className = 'spot-status ' + (ok ? 'ok' : 'err');
        if (ok && text === 'Saved') {
          setTimeout(function () {
            if (forecastStatus.textContent === 'Saved') forecastStatus.textContent = '';
          }, 1500);
        }
      }

      forecastSelect.addEventListener('change', function () {
        const body = new URLSearchParams({ forecast_telegram: forecastSelect.value });
        setForecastStatus('Saving…', true);
        fetch('/settings/forecast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString()
        }).then(function (res) {
          if (!res.ok) throw new Error('save failed');
          setForecastStatus('Saved', true);
        }).catch(function () {
          setForecastStatus('Save failed', false);
        });
      });
    })();

    (function () {
      const wgInput = document.getElementById('windguru_id');
      const nameInput = document.getElementById('spot_name');
      const addBtn = document.getElementById('add-spot-btn');
      const addStatus = document.getElementById('add-spot-status');

      function setAddStatus(text, ok) {
        addStatus.textContent = text;
        addStatus.className = 'spot-status ' + (ok ? 'ok' : 'err');
      }

      addBtn.addEventListener('click', function () {
        const windguruId = wgInput.value.trim();
        const name = nameInput.value.trim();
        if (!windguruId || !name) {
          setAddStatus('Enter station ID and name', false);
          return;
        }
        const body = new URLSearchParams({ windguru_id: windguruId, name: name });
        addBtn.disabled = true;
        setAddStatus('Adding…', true);
        fetch('/settings/spots/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString()
        }).then(function (res) {
          return res.text().then(function (text) {
            if (!res.ok) throw new Error(text || 'add failed');
            return text;
          });
        }).then(function () {
          setAddStatus('Added — reloading…', true);
          location.reload();
        }).catch(function (err) {
          addBtn.disabled = false;
          setAddStatus(err.message || 'Add failed', false);
        });
      });
    })();

    (function () {
      const tbody = document.getElementById('spots-body');
      const status = document.getElementById('spot-status');
      let saveTimer = null;
      let dragRow = null;

      function collectState() {
        const order = [];
        const visible = [];
        const collect = [];
        tbody.querySelectorAll('tr[data-key]').forEach(function (row) {
          const key = row.dataset.key;
          order.push(key);
          if (row.querySelector('.spot-visible').checked) {
            visible.push(key);
          }
          if (row.querySelector('.spot-collect').checked) {
            collect.push(key);
          }
        });
        return {
          spot_order: order.join(','),
          visible_spots: visible.join(','),
          collect_spots: collect.join(',')
        };
      }

      function setStatus(text, ok) {
        status.textContent = text;
        status.className = 'spot-status ' + (ok ? 'ok' : 'err');
        if (ok && text === 'Saved') {
          setTimeout(function () {
            if (status.textContent === 'Saved') status.textContent = '';
          }, 1500);
        }
      }

      function saveSpots() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function () {
          const body = new URLSearchParams(collectState());
          setStatus('Saving…', true);
          fetch('/settings/spots', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString()
          }).then(function (res) {
            if (!res.ok) throw new Error('save failed');
            setStatus('Saved', true);
          }).catch(function () {
            setStatus('Save failed', false);
          });
        }, 200);
      }

      tbody.addEventListener('change', function (e) {
        if (e.target.classList.contains('spot-visible') || e.target.classList.contains('spot-collect')) {
          saveSpots();
        }
      });

      tbody.addEventListener('click', function (e) {
        const row = e.target.closest('tr[data-key]');
        if (!row) return;
        if (e.target.classList.contains('move-up')) {
          const prev = row.previousElementSibling;
          if (prev) tbody.insertBefore(row, prev);
          saveSpots();
        }
        if (e.target.classList.contains('move-down')) {
          const next = row.nextElementSibling;
          if (next) tbody.insertBefore(next, row);
          saveSpots();
        }
      });

      tbody.addEventListener('dragstart', function (e) {
        const row = e.target.closest('tr[data-key]');
        if (!row || e.target.classList.contains('spot-visible') || e.target.classList.contains('spot-collect')) {
          e.preventDefault();
          return;
        }
        dragRow = row;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      tbody.addEventListener('dragend', function () {
        if (dragRow) dragRow.classList.remove('dragging');
        tbody.querySelectorAll('.drag-over').forEach(function (r) { r.classList.remove('drag-over'); });
        dragRow = null;
      });

      tbody.addEventListener('dragover', function (e) {
        e.preventDefault();
        const row = e.target.closest('tr[data-key]');
        if (!row || row === dragRow) return;
        tbody.querySelectorAll('.drag-over').forEach(function (r) {
          if (r !== row) r.classList.remove('drag-over');
        });
        row.classList.add('drag-over');
      });

      tbody.addEventListener('drop', function (e) {
        e.preventDefault();
        const row = e.target.closest('tr[data-key]');
        if (!row || !dragRow || row === dragRow) return;
        row.classList.remove('drag-over');
        tbody.insertBefore(dragRow, row);
        saveSpots();
      });
    })();
  </script>
</body>
</html>
