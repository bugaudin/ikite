<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Israel Wind Data</title>
  <style>
    table td { text-align: center; padding-right: 7px; }
    table thead td:not(:first-child) {
      padding-right: 0; border: 1px solid #00000017; border-bottom-color: black;
    }
    @media only screen and (max-width: 600px) {
      table td { padding-right: 2px; }
      body { margin-left: 2px; font-size: 11px; }
    }
    .wind18 { background-color: #ffe100; }
    .wind16 { background-color: #cbff00; }
    .wind14 { background-color: rgba(11,254,0,1); }
    .wind10 { background-color: rgba(82,249,192,1); }
    .wind8 { background-color: rgba(157,250,246,1); }
    .wind_arrow { width: 15px; height: 15px; }
    .report_en { margin-bottom: 12px; max-width: 900px; }
    nav a { margin-right: 12px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Table</a>
    <a href="/graph">Graph</a>
    <a href="/camera">Camera</a>
    <a href="/?p=day">Day</a>
    <a href="/?p=week">Week</a>
  </nav>

  {{if .ReportEN}}
  <div class="report_en">{{.ReportEN}}</div>
  {{end}}

  <table>
    <thead>
      <tr>
        <td></td>
        {{range .Headers}}
        <td{{if .CSS}} class="{{.CSS}}"{{end}}>{{boldKY .Name .Key}}</td>
        {{end}}
      </tr>
    </thead>
    <tbody>
      {{range .Rows}}
      <tr>
        <td>{{.Time}}</td>
        {{range .Cells}}
          {{if .Empty}}
          <td></td>
          {{else}}
          <td{{if .CSS}} class="{{.CSS}}"{{end}}>
            <svg class="wind_arrow" version="1.1" viewBox="0 0 100 100"><g transform="rotate({{.WindDir}},50,50) translate(0,5)"><path d="m50,0 -20,30 16,-3 -3,63 14,0 -3,-63 16,3 -20,-30z" fill="black" stroke-width="0"></path></g></svg>
            {{printf "%.0f" .Wind}}-{{printf "%.0f" .Gust}}{{if .Temp}}<small> {{temp .Temp}}℃</small>{{end}}
          </td>
          {{end}}
        {{end}}
      </tr>
      {{end}}
    </tbody>
  </table>
</body>
</html>
